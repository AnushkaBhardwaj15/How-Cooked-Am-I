services:
  # ── Backend API (Node.js / Express) ──────────────────────────────────────────
  - type: web
    name: how-cooked-am-i-server
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false          # Set this manually in the Render dashboard
      - key: JWT_SECRET
        generateValue: true  # Render auto-generates a secure random value
      - key: CLIENT_ORIGIN
        sync: false          # Set to your frontend URL after deploying it
    autoDeploy: true
