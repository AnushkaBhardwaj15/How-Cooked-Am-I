services:
  # ── Backend API (Node.js / Express) ──────────────────────────────────────────
  - type: web
    name: how-cooked-am-i-server
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: CLIENT_ORIGIN
        value: https://how-cooked-am-i-zeta.vercel.app
      - key: MONGODB_URI
        sync: false          # Paste your Atlas URI in the Render dashboard
      - key: JWT_SECRET
        generateValue: true  # Render auto-generates a secure random value
    autoDeploy: true
